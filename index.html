<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP Calendar</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;padding:0;background:#aaa;font-family:Arial,'MS Gothic',sans-serif}
.tv{font-family:Arial,'MS Gothic',sans-serif;color:#000;background:#d4d4d4;border-radius:0;padding:12px;position:relative;overflow:visible;border:2px solid #444}
.inner{position:relative;z-index:1}
.tv-title{font-size:10px;letter-spacing:.18em;font-weight:bold;text-transform:uppercase;color:#555;margin-bottom:10px}
.dh{text-align:left;padding:0 0 12px;margin-bottom:12px}
.dh-y-pre{font-size:10px;letter-spacing:.12em;font-weight:bold;text-transform:uppercase;color:#444;margin-bottom:3px}
.dh-y{font-size:52px;font-weight:bold;color:#000;letter-spacing:1px}
.dh-a{font-size:14px;color:#000;margin-top:6px;letter-spacing:.05em}
.dh-s{font-size:12px;color:#222;margin-top:3px}
.dh-irl{font-size:10px;color:#555;margin-top:4px;letter-spacing:.06em}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#f0f0f0;border:1.5px solid #444;padding:12px}
.lbl{font-size:10px;letter-spacing:.12em;color:#222;font-weight:bold;text-transform:uppercase;margin-bottom:8px}
.sname{font-size:14px;color:#000;font-weight:bold}
.srange{font-size:11px;color:#222;margin:4px 0 10px}
.sbar{display:flex;gap:1px}
.sp{flex:1;height:5px;background:#bbb;border:1px solid #888}
.sp.past{background:#555}
.sp.curr{background:#000}
.mc{display:flex;flex-direction:column;align-items:flex-start}
.mpn{font-size:12px;margin-top:6px;color:#000;font-weight:bold}
.mps{font-size:9px;color:#666;margin-top:2px}
.plbl{font-size:10px;letter-spacing:.12em;color:#222;font-weight:bold;text-transform:uppercase;margin-bottom:8px}
.pstrip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:thin;scrollbar-color:#666 #d4d4d4}
.pstrip::-webkit-scrollbar{height:5px}
.pstrip::-webkit-scrollbar-track{background:#d4d4d4}
.pstrip::-webkit-scrollbar-thumb{background:#666}
.pi{flex:0 0 auto;width:110px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:10px 8px;background:#f0f0f0;border:1.5px solid #444}
.psig{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#ddd;border:1.5px solid #444;overflow:hidden}
.psig img{width:100%;height:100%;object-fit:contain;display:block}
.pn{font-size:11px;color:#000;font-weight:bold}
.psc{font-size:8px;color:#444;letter-spacing:.05em;font-style:italic}
.pp{font-size:11px;font-weight:bold;margin-top:2px;letter-spacing:.05em}
.pdef{font-size:8px;margin-top:1px;color:#333}
.c-near{color:#444}.c-close{color:#080}.c-far{color:#c00}
.b-near{border-color:#444!important}.b-close{border-color:#080!important}.b-far{border-color:#c00!important}
.legend{font-size:9px;color:#666;margin-top:4px;letter-spacing:.04em}
.legend b{color:#333}
.statusrow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.statcard{background:#f0f0f0;border:1.5px solid #444;padding:10px 12px}
.statcard .slbl{font-size:10px;letter-spacing:.12em;font-weight:bold;text-transform:uppercase;margin-bottom:6px}
.statcard.empowered .slbl{color:#080}
.statcard.faint .slbl{color:#c00}
.statcard .sitem{font-size:11px;color:#222;padding:1px 0;letter-spacing:.04em}
.statcard .sempty{font-size:10px;color:#888;font-style:italic}
.gmtab{position:absolute;top:0;right:0;font-size:9px;letter-spacing:.07em;color:#888;text-transform:uppercase;background:#c8c8c8;border-left:1px solid #888;border-bottom:1px solid #888;padding:3px 7px;cursor:pointer;user-select:none;z-index:20}
.gmtab:hover{color:#333;background:#bbb}
.gmprompt{display:none;position:absolute;top:24px;right:0;background:#f0f0f0;border:1.5px solid #444;padding:10px 12px;z-index:30;min-width:180px}
.gmprompt .eplbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:bold;margin-bottom:6px;color:#222}
.gmprompt input[type=password]{font-size:11px;border:1px solid #888;padding:3px 5px;width:120px;background:#fff}
.gmprompt button{font-size:10px;margin-left:5px;padding:3px 7px;cursor:pointer}
.gmcontrols{display:none;margin-top:10px;padding:10px 12px;background:#e8e8e8;border:1.5px solid #444}
.gclbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:bold;margin-bottom:8px;color:#222}
.gcsub{font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:bold;color:#666;margin:10px 0 5px;border-top:1px solid #ccc;padding-top:8px}
.gmbtn{font-size:11px;padding:3px 8px;cursor:pointer;border:1px solid #555;background:#ddd;letter-spacing:.04em;margin-right:4px;margin-bottom:4px}
.gmbtn:hover{background:#ccc}
.gmbtn.active{background:#444;color:#fff;border-color:#222}
.gmpub{font-size:11px;padding:4px 10px;cursor:pointer;border:1.5px solid #080;background:#dff0df;letter-spacing:.04em;margin-top:4px;width:100%}
.gmpub:hover{background:#cfe8cf}
.gmrow{margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.gmrow label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:bold;color:#444}
.gmrow select,.gmrow input[type=number],.gmrow input[type=date]{font-size:11px;border:1px solid #888;padding:2px 4px;background:#f0f0f0;cursor:pointer}
.gmrow input[type=number]{width:76px}
.gmrow input[type=date]{width:auto}
.irl-result{font-size:11px;color:#222;margin-top:6px;padding:5px 8px;background:#f0f0f0;border:1px solid #aaa;display:none}
.irl-result b{color:#000}
.gmstatus{font-size:9px;color:#555;margin-top:6px;letter-spacing:.05em}
.pub-feedback{font-size:9px;color:#080;margin-top:4px;display:none}
.storage-note{font-size:8px;color:#888;margin-top:4px;font-style:italic}
.sr-only{display:none}
  </style>
</head>
<body>
<div class="tv">
<div class="gmtab" id="gmtab" onclick="toggleGMPrompt()">GM</div>
<div class="gmprompt" id="gmprompt">
  <div class="eplbl">GM Access</div>
  <input type="password" id="gmcode" placeholder="Enter code" onkeydown="if(event.key==='Enter')checkCode()">
  <button onclick="checkCode()">OK</button>
</div>
<div class="inner">
<h2 class="sr-only">RP Calendar</h2>
<div class="tv-title">RP Calendar</div>
<div class="dh">
  <div class="dh-y-pre">Current Year:</div>
  <div class="dh-y" id="dy">21,350 RS</div>
  <div class="dh-a" id="da">June</div>
  <div class="dh-s" id="ds">Early Summer</div>
  <div class="dh-irl" id="dh-irl"></div>
</div>
<div class="two">
  <div class="card">
    <div class="lbl">Current Season</div>
    <div class="sname" id="sn">Early Summer</div>
    <div class="srange" id="sr">June</div>
    <div class="sbar" id="sb"></div>
  </div>
  <div class="card">
    <div class="lbl">Current Lunar Phase</div>
    <div class="mc">
      <div id="msv"></div>
      <div class="mpn" id="mpn">New Moon</div>
      <div class="mps">Ashr - cycle of 8 months</div>
    </div>
  </div>
</div>
<div class="plbl">Planetary Orbits</div>
<div class="pstrip" id="pg"></div>

<div class="statusrow">
  <div class="statcard empowered">
    <div class="slbl">Empowered</div>
    <div id="empowered-list"><span class="sempty">none</span></div>
  </div>
  <div class="statcard faint">
    <div class="slbl">Faint</div>
    <div id="faint-list"><span class="sempty">none</span></div>
  </div>
</div>
</div>

<div class="gmcontrols" id="gmcontrols">
  <div class="gclbl">GM Controls</div>

  <div class="gcsub" style="border-top:none;padding-top:0">Jump to RP Date</div>
  <div class="gmrow">
    <label>Year</label>
    <input type="number" id="jy" value="21350" min="21350" max="99999">
    <label>Month</label>
    <select id="js"></select>
    <button class="gmbtn" onclick="goTo()">Go</button>
  </div>

  <div class="gcsub">Jump by IRL Date</div>
  <div class="gmrow">
    <label>IRL Date</label>
    <input type="date" id="irl-jump" onchange="calcIRLDate()">
    <button class="gmbtn" onclick="jumpToIRL()">Go</button>
  </div>
  <div class="irl-result" id="irl-result"></div>

  <div class="gcsub">Playback</div>
  <div>
    <button class="gmbtn" id="btn-stepb" onclick="stepBack()">|&#9664; Back</button>
    <button class="gmbtn" id="btn-rev"   onclick="setMode('rev')">&#9664; Reverse</button>
    <button class="gmbtn" id="btn-pause" onclick="setMode('pause')">&#9646;&#9646; Pause</button>
    <button class="gmbtn" id="btn-play"  onclick="setMode('play')">&#9654; Play</button>
    <button class="gmbtn" id="btn-stepf" onclick="stepFwd()">&#9654;| Step</button>
  </div>
  <div class="gmrow">
    <label>Speed</label>
    <select id="gmspeed" onchange="onSpeedChange()">
      <option value="86400000" selected>1 day = 1 month</option>
      <option value="172800000">2 days = 1 month</option>
      <option value="259200000">3 days = 1 month</option>
      <option value="345600000">4 days = 1 month</option>
      <option value="432000000">5 days = 1 month</option>
      <option value="10000">10 seconds = 1 month [TESTING]</option>
    </select>
  </div>
  <div class="gmstatus" id="gmstatus">Paused</div>

  <div class="gcsub">Publish</div>
  <button class="gmpub" onclick="publishState()">&#10003; Publish and Save</button>
  <div class="pub-feedback" id="pub-feedback"></div>
  <div class="storage-note" id="storage-note"></div>
</div>
</div>

function curTot(){return(st.year-SY)*SEGS+st.seg;}

function schoolName(p){return p.s.split(' / ')[1];}

/* ── Apply a saved state object, advancing by elapsed real time ── */
function applyState(saved){
  if(!saved||!saved.y||saved.s==null||!saved.t) return false;
  const sp=saved.sp||86400000;
  anchor={year:saved.y,seg:saved.s,speed:sp,timestamp:saved.t};
  const steps=Math.max(0,Math.floor((Date.now()-saved.t)/sp));
  st={year:saved.y,seg:saved.s};
  for(let i=0;i<steps;i++){st.seg++;if(st.seg>=SEGS){st.seg=0;st.year++;}}
  /* sync speed selector */
  const sel=g('gmspeed');
  if(sel){for(let i=0;i<sel.options.length;i++){if(parseInt(sel.options[i].value)===sp){sel.selectedIndex=i;break;}}}
  return true;
}

/* ── Storage: load ─────────────────────────────────────────────── */
async function loadState(){
  /* 1. Try remote endpoint */
  if(STORAGE_ENDPOINT){
    try{
      const res=await fetch(STORAGE_ENDPOINT);
      if(res.ok){
        const data=await res.json();
        if(applyState(data)){render();return;}
      }
    }catch(e){console.warn('Remote storage unavailable, falling back to URL hash.',e);}
  }
  /* 2. Fallback: URL hash */
  const h=window.location.hash.slice(1);
  if(h){
    const p=new URLSearchParams(h);
    applyState({y:parseInt(p.get('y')),s:parseInt(p.get('s')),sp:parseInt(p.get('sp'))||86400000,t:parseInt(p.get('t'))});
  }
  render();
}

/* ── Storage: save (GM publish) ────────────────────────────────── */
async function publishState(){
  const sp=getSpeed();
  const payload={y:st.year,s:st.seg,sp,t:Date.now()};
  anchor={year:st.year,seg:st.seg,speed:sp,timestamp:payload.t};
  const fb=g('pub-feedback'), sn=g('storage-note');

  /* Always update URL hash as fallback */
  history.replaceState(null,'','#y='+payload.y+'&s='+payload.s+'&sp='+payload.sp+'&t='+payload.t);
  const url=window.location.href;

  /* Try remote endpoint first */
  if(STORAGE_ENDPOINT){
    try{
      const res=await fetch(STORAGE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(res.ok){
        fb.textContent='Saved to server. All players will see this date on next load.';
        fb.style.display='block';
        if(sn) sn.textContent='';
        setTimeout(()=>fb.style.display='none',4000);
        return;
      } else {
        fb.textContent='Server error ('+res.status+') - link copied as fallback. Check KV binding.';
        fb.style.display='block';
        if(sn) sn.textContent='Check that the RP_STATE KV binding is set in Pages > Settings > Bindings.';
        setTimeout(()=>{fb.style.display='none';if(sn)sn.textContent='';},8000);
        try{await navigator.clipboard.writeText(url);}catch(e){}
        return;
      }
    }catch(e){
      console.error('RP Calendar: /state request failed:',e);
      fb.textContent='Server unreachable - link copied as fallback. Check console (F12) for details.';
      fb.style.display='block';
      if(sn) sn.textContent='Ensure functions/state.js is in your GitHub repo and KV is bound.';
      setTimeout(()=>{fb.style.display='none';if(sn)sn.textContent='';},8000);
      try{await navigator.clipboard.writeText(url);}catch(e){}
      return;
    }
  }

  /* Truly no endpoint configured */
  try{await navigator.clipboard.writeText(url);}catch(e){}
  fb.textContent='No server configured - link copied to clipboard. Share it with players.';
  fb.style.display='block';
  if(sn) sn.textContent='Configure STORAGE_ENDPOINT in the script to enable server sync.';
  setTimeout(()=>{fb.style.display='none';if(sn)sn.textContent='';},6000);
}

/* ── IRL date utility ──────────────────────────────────────────── */
function irlDate(){
  const d=new Date();
  return'IRL: '+d.getDate()+' '+IRL_M[d.getMonth()]+' '+d.getFullYear();
}

/* Convert an IRL Date object to RP {year, seg} using anchor */
function irlToRP(date){
  if(!anchor) return null;
  const ms=date.getTime()-anchor.timestamp;
  const steps=Math.round(ms/anchor.speed);
  let year=anchor.year,seg=anchor.seg;
  if(steps>0){for(let i=0;i<steps;i++){seg++;if(seg>=SEGS){seg=0;year++;}}}
  else{for(let i=0;i<-steps;i++){seg--;if(seg<0){if(year>SY){seg=SEGS-1;year--;}else seg=0;}}}
  return{year,seg};
}

function calcIRLDate(){
  const input=g('irl-jump');
  const res=g('irl-result');
  if(!input||!input.value){res.style.display='none';return;}
  if(!anchor){
    res.innerHTML='No reference set - publish first to establish an anchor point.';
    res.style.display='block';return;
  }
  const d=new Date(input.value+'T12:00:00'); /* noon to avoid TZ edge cases */
  const rp=irlToRP(d);
  if(!rp){res.style.display='none';return;}
  res.innerHTML='<b>'+rp.year.toLocaleString()+' RS</b> - '+SF[rp.seg]+' ('+MONTHS[rp.seg]+')';
  res.style.display='block';
}

function jumpToIRL(){
  const input=g('irl-jump');
  if(!input||!input.value||!anchor) return;
  const d=new Date(input.value+'T12:00:00');
  const rp=irlToRP(d);
  if(!rp) return;
  st={year:rp.year,seg:rp.seg};
  render();
  const js=g('js');if(js)js.value=st.seg;
  const jy=g('jy');if(jy)jy.value=st.year;
}

/* ── Moon SVG ──────────────────────────────────────────────────── */
function moonSVG(ph){
  const sz=60,r=24,cx=30,cy=30;
  const D='#111',L='#f0f0f0',B='#555';
  const T=cx+','+(cy-r),Bo=cx+','+(cy+r);
  const trx=r*0.6;
  const base='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+D+'" stroke="'+B+'" stroke-width="2"/>';
  const paths={
    0:'',
    1:'<path d="M '+T+' A '+r+' '+r+' 0 0 1 '+Bo+' A '+trx+' '+r+' 0 0 0 '+T+' Z" fill="'+L+'"/>',
    2:'<path d="M '+T+' A '+r+' '+r+' 0 0 1 '+Bo+' L '+T+' Z" fill="'+L+'"/>',
    3:'<path d="M '+T+' A '+r+' '+r+' 0 0 1 '+Bo+' A '+trx+' '+r+' 0 0 1 '+T+' Z" fill="'+L+'"/>',
    4:'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+L+'" stroke="'+B+'" stroke-width="2"/>',
    5:'<path d="M '+T+' A '+r+' '+r+' 0 0 0 '+Bo+' A '+trx+' '+r+' 0 0 0 '+T+' Z" fill="'+L+'"/>',
    6:'<path d="M '+T+' A '+r+' '+r+' 0 0 0 '+Bo+' L '+T+' Z" fill="'+L+'"/>',
    7:'<path d="M '+T+' A '+r+' '+r+' 0 0 0 '+Bo+' A '+trx+' '+r+' 0 0 1 '+T+' Z" fill="'+L+'"/>'
  };
  return'<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" xmlns="http://www.w3.org/2000/svg">'+base+(paths[ph]||'')+'</svg>';
}

/* ── Render ────────────────────────────────────────────────────── */
function render(){
  const lp=curTot()%8;
  set('dy',st.year.toLocaleString()+' RS');
  set('da',MONTHS[st.seg]);set('ds',SF[st.seg]);
  set('dh-irl',irlDate());set('sn',SF[st.seg]);set('sr',MONTHS[st.seg]);
  const sb=g('sb');sb.innerHTML='';
  for(let i=0;i<SEGS;i++){const d=mk('div','sp'+(i<st.seg?' past':i===st.seg?' curr':''));sb.appendChild(d);}
  const mv=g('msv');if(mv)mv.innerHTML=moonSVG(lp);
  set('mpn',LN[lp]);
  const pg=g('pg');pg.innerHTML='';
  const emp=[],fnt=[];
  PL.forEach(p=>{
    const pos=getPPos(p);
    const cls=pos==='Perlaxis'?'close':pos==='Apoaxis'?'far':'near';
    const def=pos==='Perlaxis'?'Closest':pos==='Apoaxis'?'Distant':'Near';
    const d=mk('div','pi');
    d.innerHTML='<div class="psig b-'+cls+'"><img src="data:image/png;base64,'+SIG[p.n]+'" alt="'+p.n+'"/></div>'+
      '<div class="pn">'+p.n+'</div><div class="psc">'+p.s+'</div>'+
      '<div class="pp c-'+cls+'">'+pos+'</div><div class="pdef c-'+cls+'">'+def+'</div>';
    pg.appendChild(d);
    if(pos==='Perlaxis') emp.push(schoolName(p));
    if(pos==='Apoaxis')  fnt.push(schoolName(p));
  });
  const el=g('empowered-list'),fl=g('faint-list');
  el.innerHTML=emp.length?emp.map(s=>'<div class="sitem">'+s+'</div>').join(''):'<span class="sempty">none</span>';
  fl.innerHTML=fnt.length?fnt.map(s=>'<div class="sitem">'+s+'</div>').join(''):'<span class="sempty">none</span>';
  updateStatus();
}

function toggleGMPrompt(){
  if(gmUnlocked)return;
  const p=g('gmprompt');
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display==='block')setTimeout(()=>{const c=g('gmcode');if(c)c.focus();},40);
}

function checkCode(){
  const inp=g('gmcode');if(!inp)return;
  if(inp.value.toUpperCase()===atob(_cx.map(c=>String.fromCharCode(c)).join(''))){
    gmUnlocked=true;
    g('gmprompt').style.display='none';
    g('gmcontrols').style.display='block';
    const t=g('gmtab');t.textContent='GM \u25cf';t.style.color='#333';t.onclick=null;
    const js=g('js');
    SF.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s;js.appendChild(o);});
    js.value=st.seg;g('jy').value=st.year;
    /* show storage status */
    const sn=g('storage-note');
    if(sn) sn.textContent=STORAGE_ENDPOINT?'Server storage configured: '+STORAGE_ENDPOINT:'No server configured - using URL hash sharing.';
    updateStatus();
  } else {
    inp.value='';inp.placeholder='Incorrect';inp.style.borderColor='#c00';
    setTimeout(()=>{inp.placeholder='Enter code';inp.style.borderColor='#888';},1500);
  }
}

function goTo(){
  const y=parseInt(g('jy').value),s=parseInt(g('js').value);
  if(!isNaN(y)&&y>=SY&&!isNaN(s)&&s>=0&&s<SEGS){st={year:y,seg:s};render();}
}

function advanceDate(dir){
  st.seg+=dir;
  if(st.seg>=SEGS){st.seg=0;st.year++;}
  else if(st.seg<0){if(st.year>SY){st.seg=SEGS-1;st.year--;}else st.seg=0;}
  render();
}

function setMode(mode){
  if(gmTimer){clearInterval(gmTimer);gmTimer=null;}
  ['btn-rev','btn-pause','btn-play'].forEach(id=>{const b=g(id);if(b)b.classList.remove('active');});
  if(mode==='pause') g('btn-pause').classList.add('active');
  else if(mode==='play'){gmDir=1;g('btn-play').classList.add('active');gmTimer=setInterval(()=>advanceDate(1),getSpeed());}
  else if(mode==='rev'){gmDir=-1;g('btn-rev').classList.add('active');gmTimer=setInterval(()=>advanceDate(-1),getSpeed());}
  updateStatus();
}

function onSpeedChange(){if(gmTimer)setMode(gmDir>0?'play':'rev');}
function stepFwd(){if(gmTimer){clearInterval(gmTimer);gmTimer=null;}['btn-rev','btn-pause','btn-play'].forEach(id=>{const b=g(id);if(b)b.classList.remove('active');});advanceDate(1);updateStatus();}
function stepBack(){if(gmTimer){clearInterval(gmTimer);gmTimer=null;}['btn-rev','btn-pause','btn-play'].forEach(id=>{const b=g(id);if(b)b.classList.remove('active');});advanceDate(-1);updateStatus();}

function updateStatus(){
  const s=g('gmstatus');if(!s||!gmUnlocked)return;
  const sel=g('gmspeed');
  const label=sel?sel.options[sel.selectedIndex].text:'';
  if(!gmTimer) s.textContent='Paused - '+label;
  else if(gmDir>0) s.textContent='Playing forward - '+label;
  else s.textContent='Reverse - '+label;
}

loadState();

/* ── Live display update ───────────────────────────────────────────
   Re-evaluates the current RP date every 30 seconds while the page
   is open. Catches the exact moment a new segment becomes due and
   updates the display without requiring a page refresh.            */
setInterval(()=>{
  if(!anchor) return;
  const steps=Math.max(0,Math.floor((Date.now()-anchor.timestamp)/anchor.speed));
  let year=anchor.year,seg=anchor.seg;
  for(let i=0;i<steps;i++){seg++;if(seg>=SEGS){seg=0;year++;}}
  if(year!==st.year||seg!==st.seg){st={year,seg};render();}
},30000);
</script>
</body>
